# Kamal deploy config for goal_atlas → Hetzner CPX21 (Ashburn).
# Secrets pulled from .kamal/secrets (gitignored); see .kamal/secrets.example.

service: goal_atlas
image: tuxnotfound/goal_atlas  # GitHub username gets templated in via secrets at deploy time

# First-boot db:prepare runs all seeds (~30s of inserts). Default kamal-proxy
# deploy-timeout of 30s kills the container mid-seed. Steady-state boots
# without seeds finish in seconds, so this is only the first-boot ceiling.
deploy_timeout: 180

servers:
  web:
    - 5.161.109.253

# Kamal-provided SSL proxy: terminates HTTPS with Let's Encrypt and forwards
# plaintext to the app container on the docker network. The Rails side has
# config.assume_ssl + config.force_ssl, so cookies stay secure and HSTS is set.
proxy:
  ssl: true
  host: thegoalatlas.com
  # Admin's "stylize portrait" hits OpenAI gpt-image-1 synchronously; that
  # request takes 45-60s. Default kamal-proxy target-timeout (30s) returns
  # 504. Bump to 120s so admin requests have headroom.
  response_timeout: 120
  healthcheck:
    interval: 3
    timeout: 5
    path: /up

registry:
  server: ghcr.io
  username: tuxnotfound
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - GOAL_ATLAS_DATABASE_PASSWORD
    - YOUTUBE_API_KEY
    - OPENAI_API_KEY
    - GEMINI_API_KEY
    - API_FOOTBALL_KEY
    - ADMIN_EMAIL
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: goal_atlas-db        # name of the Postgres accessory below
    RAILS_LOG_LEVEL: info

    # Thruster (HTTP proxy in front of Puma) defaults to 30s write timeout,
    # which is shorter than OpenAI gpt-image-1's ~55s call. Bump so admin
    # stylize requests aren't cut mid-response.
    HTTP_IDLE_TIMEOUT: 180
    HTTP_WRITE_TIMEOUT: 180

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
  seed:    app exec --reuse "bin/rails db:seed"

# Persistent volume for stylized portraits (storage/) and any future ad-hoc
# uploads. Backed up off-box separately via the nightly pg_dump job.
volumes:
  - "goal_atlas_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  # Building on macOS (arm64) for an amd64 target via QEMU is slow but works.
  # Switch to `remote: ssh://docker@5.161.109.253` once we want faster builds.

ssh:
  user: root
  keys: ["~/.ssh/id_ed25519_tuxnotfound"]

# --- Accessories ---------------------------------------------------------
# Postgres 16 runs on the same box. Data + WAL on a host-mounted volume so
# pg_dump backups are filesystem-trivial.
accessories:
  db:
    image: postgres:16
    host: 5.161.109.253
    port: "127.0.0.1:5432:5432"   # only listen on loopback; app reaches it on docker network
    env:
      clear:
        POSTGRES_USER: goal_atlas
        POSTGRES_DB: goal_atlas_production
      secret:
        - POSTGRES_PASSWORD       # mirrors GOAL_ATLAS_DATABASE_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
