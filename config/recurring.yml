#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # WC2026 result sync. Only meaningful during the tournament window
  # (2026-06-11 → 2026-07-19); the sync no-ops when no matches need updating.
  # Hits api-football once per run + sets ~10 columns on finished matches.
  wc2026_sync:
    command: "Wc2026Sync.new.call"
    schedule: every 15 minutes
